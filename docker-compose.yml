version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: blueprints-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blueprints_user
      POSTGRES_PASSWORD: blueprints_pass
      POSTGRES_DB: blueprints_db
    ports:
      - "5432:5432"
    volumes:
      - blueprints_pgdata:/var/lib/postgresql/data

volumes:
  blueprints_pgdata: