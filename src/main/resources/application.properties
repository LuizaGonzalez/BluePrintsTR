spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Perfil activo: usaremos "postgres" para conectarnos a la base de datos

spring.profiles.active=postgres

# Datos de conexion a PostgreSQL

spring.datasource.url=jdbc:postgresql://localhost:5432/blueprints_db
spring.datasource.username=blueprints_user
spring.datasource.password=blueprints_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de Hibernate/JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always